<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Overview — GW2 Progression</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/style.css?v=20260627" />
  <link rel="stylesheet" href="/static/style-account.css?v=20260627" />
  <meta name="theme-color" content="#c8956c" />
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="sym-nav-account" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="7"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/><path d="M8 16l2.6-5.4L16 8l-2.6 5.4L8 16z"/><path d="M10 10l4 4"/></g></symbol>
  <symbol id="sym-nav-insight" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5z"/><circle cx="12" cy="12" r="2.5"/></g></symbol>
  <symbol id="sym-nav-plan" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="3"/><path d="M12 5l1.4 4.1L18 12l-4.6 2.9L12 19l-1.4-4.1L6 12l4.6-2.9L12 5z"/></g></symbol>
  <symbol id="sym-kpi-account-value" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9c0-1.7 3.1-3 7-3s7 1.3 7 3-3.1 3-7 3-7-1.3-7-3z"/><path d="M5 9v6c0 1.7 3.1 3 7 3s7-1.3 7-3V9"/><path d="M5 12c0 1.7 3.1 3 7 3s7-1.3 7-3"/><path d="M5 15c0 1.7 3.1 3 7 3s7-1.3 7-3"/></g></symbol>
  <symbol id="sym-kpi-hidden-wealth" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></g></symbol>
  <symbol id="sym-kpi-legendary" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 9 22 9 16 14 18 22 12 17 6 22 8 14 2 9 9 9 12 2"/></g></symbol>
  <symbol id="sym-action-export" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M8 7l4-4 4 4"/><path d="M4 14v5a2 2 0 002 2h12a2 2 0 002-2v-5"/></g></symbol>
  <symbol id="sym-asset-wallet" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18v12H3z"/><path d="M3 7V5h18v2"/><circle cx="12" cy="12" r="2"/></g></symbol>
  <symbol id="sym-asset-materials" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="10" r="2.5"/><path d="M6 18l3-5 4 2 2-4 3 7z"/></g></symbol>
  <symbol id="sym-asset-bank" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="12"/><path d="M4 8L12 3l8 5"/><path d="M9 14v3M12 13v4M15 14v3"/></g></symbol>
  <symbol id="sym-asset-equipment" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c-2 0-4 2-4 4v1c0 2 1 3 2 4l-2 7h8l-2-7c1-1 2-2 2-4V7c0-2-2-4-4-4z"/></g></symbol>
  <symbol id="sym-status-active" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/></symbol>
</svg>

<header>
  <h1>GW2 Progression</h1>
  <span>Account Intelligence</span>
</header>

<nav class="nav-os" id="os-nav" role="tablist">
  <button class="active" data-nav="account" role="tab"><svg width="18" height="18"><use href="#sym-nav-account"/></svg> Account</button>
  <button class="requires-auth" data-nav="insight" role="tab"><svg width="18" height="18"><use href="#sym-nav-insight"/></svg> Insight</button>
  <button class="requires-auth" data-nav="plan" role="tab"><svg width="18" height="18"><use href="#sym-nav-plan"/></svg> Plan</button>
  <button class="requires-auth" data-nav="report" role="tab"><svg width="18" height="18"><use href="#sym-action-export"/></svg> Report</button>
</nav>

<main>

  <!-- ═══ KEY SECTION ═══ -->
  <div id="key-section">
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:20px;font-weight:700;color:var(--gw2-gold);font-family:var(--gw2-font-display);margin-bottom:4px">Connect Your GW2 Account</div>
      <div style="font-size:13px;color:var(--gw2-text-dim)">Enter your API key to analyze your account.</div>
    </div>
    <div id="key-row">
      <input id="key-input" type="text" placeholder="Paste your GW2 API key…" autocomplete="off" spellcheck="false" />
      <button id="analyze-btn">Analyze</button>
      <select id="account-selector" class="hidden"></select>
    </div>
    <div id="status-msg" role="status"></div>
  </div>

  <!-- ═══ LAYER 0: SYSTEM OVERVIEW ═══ -->
  <div id="layer-overview" class="hidden">
    <div class="layer-header">
      <div>
        <div class="overview-title" id="header-account-name">—</div>
        <div class="overview-sub" id="header-last-sync">Last sync: —</div>
      </div>
      <div class="overview-actions">
        <span class="api-badge" id="api-status-badge" data-status="unknown">● Unknown</span>
        <button class="btn-sm" id="btn-refresh">↻ Refresh</button>
        <button class="btn-sm" id="btn-export">↓ Export</button>
      </div>
    </div>
    <div class="overview-grid" id="overview-grid">
      <div class="overview-ring" id="overview-ring">
        <canvas id="value-ring-chart"></canvas>
      </div>
      <div class="overview-kpis">
        <div class="okpi"><span class="okpi-label">Total Value</span><span class="okpi-value" id="ov-total-value">—</span></div>
        <div class="okpi"><span class="okpi-label">Liquid Value</span><span class="okpi-value" id="ov-liquid-value">—</span></div>
        <div class="okpi"><span class="okpi-label">Hidden Wealth</span><span class="okpi-value" id="ov-hidden-wealth">—</span></div>
      </div>
      <div class="overview-progress" id="overview-progress"></div>
    </div>
  </div>

  <!-- ═══ TAB BAR ═══ -->
  <div id="layer-tabs" class="hidden">
    <div class="layer-tab-bar">
      <button class="layer-tab active" data-tab="economy">Economy</button>
      <button class="layer-tab" data-tab="progress">Progress</button>
      <button class="layer-tab" data-tab="collection">Collection</button>
      <button class="layer-tab" data-tab="characters">Characters</button>
    </div>

    <!-- TAB: Economy -->
    <div class="layer-tab-content active" id="tab-economy">
      <div id="economy-list"></div>
    </div>

    <!-- TAB: Progress -->
    <div class="layer-tab-content" id="tab-progress">
      <div class="progression-grid" id="progression-grid"></div>
    </div>

    <!-- TAB: Collection -->
    <div class="layer-tab-content" id="tab-collection">
      <div class="collection-grid" id="collection-grid"></div>
    </div>

    <!-- TAB: Characters -->
    <div class="layer-tab-content" id="tab-characters">
      <div class="char-cards" id="char-cards"></div>
    </div>
  </div>

  <!-- ═══ LAYER 5: AI INSIGHTS (COLLAPSED) ═══ -->
  <div id="layer-ai" class="hidden">
    <details class="ai-drawer">
      <summary class="ai-drawer-summary">💡 AI Insights</summary>
      <div class="ai-drawer-content" id="ai-drawer-content"></div>
    </details>
  </div>

  <!-- ═══ Loading/Error ═══ -->
  <div id="loading-state" class="hidden" style="text-align:center;padding:60px 0"><div class="spinner"></div><div class="dim" style="margin-top:8px">Loading…</div></div>
  <div id="error-state" class="hidden" style="text-align:center;padding:60px 0"><div class="dim" id="error-message">Error</div><button class="btn-sm" onclick="runAnalyze()" style="margin-top:12px">Retry</button></div>

</main>

<script type="module" src="/static/app-account.v2.js"></script>
</body>
</html>
