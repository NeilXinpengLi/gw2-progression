<header>
  <h1>GW2 Progression</h1>
  <span>Account Intelligence</span>
</header>

<nav class="nav-os" id="os-nav" role="tablist">
  <button class="active" data-nav="account" role="tab"><svg width="18" height="18"><use href="#sym-nav-account"/></svg> Account</button>
  <button class="requires-auth" data-nav="insight" role="tab"><svg width="18" height="18"><use href="#sym-nav-insight"/></svg> Insight</button>
  <button class="requires-auth" data-nav="plan" role="tab"><svg width="18" height="18"><use href="#sym-nav-plan"/></svg> Plan</button>
  <button class="requires-auth" data-nav="report" role="tab"><svg width="18" height="18"><use href="#sym-action-export"/></svg> Report</button>
</nav>

<main>

  <div id="key-section">
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:20px;font-weight:700;color:var(--gw2-gold);font-family:var(--gw2-font-display);margin-bottom:4px">Connect Your GW2 Account</div>
      <div style="font-size:13px;color:var(--gw2-text-dim)">Enter your API key to analyze your account.</div>
    </div>
    <div id="key-row">
      <input id="key-input" type="text" placeholder="Paste your GW2 API key…" autocomplete="off" spellcheck="false" />
      <button id="analyze-btn">Analyze</button>
      <select id="account-selector" class="hidden"></select>
    </div>
    <div id="status-msg" role="status"></div>
  </div>

  <!-- ═══ LAYER 0: HEADER STRIP + SUMMARY STRIP ═══ -->
  <div id="layer-overview" class="hidden">
    <div class="layer-header">
      <div>
        <div class="overview-title" id="header-account-name">—</div>
        <div class="overview-sub" id="header-last-sync">Last sync: —</div>
      </div>
      <div class="overview-actions">
        <span class="api-badge" id="api-status-badge" data-status="unknown">● Unknown</span>
        <button class="btn-sm" id="btn-refresh">↻ Refresh</button>
        <button class="btn-sm" id="btn-export">↓ Export</button>
      </div>
    </div>
    <div class="overview-grid" id="overview-grid">
      <div class="overview-ring" id="overview-ring">
        <canvas id="value-ring-chart"></canvas>
      </div>
      <div class="overview-kpis">
        <div class="okpi"><span class="okpi-label">Total Value</span><span class="okpi-value" id="ov-total-value">—</span></div>
        <div class="okpi"><span class="okpi-label">Liquid Value</span><span class="okpi-value" id="ov-liquid-value">—</span></div>
        <div class="okpi"><span class="okpi-label">Hidden Wealth</span><span class="okpi-value" id="ov-hidden-wealth">—</span></div>
      </div>
      <div class="overview-progress" id="overview-progress"></div>
    </div>
  </div>

  <!-- ═══ 3-COLUMN MAIN LAYOUT ═══ -->
  <div id="layer-content" class="hidden layer-content-wrap">

    <!-- COL 1: OBJECT EXPLORER TREE -->
    <div class="explorer-tree" id="explorer-tree"></div>

    <!-- COL 2: CENTER DETAIL -->
    <div class="explorer-detail">
      <div id="graph-detail" class="graph-detail"></div>
    </div>

    <!-- COL 3: CONTEXT INSPECTOR (right panel) -->
    <div class="ai-overlay" id="ai-overlay">
      <div class="ai-overlay-header">
        <span class="ai-overlay-title">Inspector</span>
        <span class="ai-overlay-glow"></span>
      </div>
      <div class="ai-overlay-body" id="ai-overlay-body">
        <div class="ai-overlay-placeholder">Loading analysis…</div>
      </div>
      <div class="ai-overlay-footer">
        <a href="/insight" class="ai-overlay-link">View Full Insight →</a>
      </div>
    </div>

  </div>

  <!-- ═══ FOOTER INSIGHT STRIP ═══ -->
  <div id="layer-footer" class="hidden footer-strip">
    <span class="footer-strip-text">AI-powered account analysis available</span>
    <a href="/insight" class="footer-strip-link">→ Open Insight</a>
  </div>

  <!-- ═══ Loading/Error ═══ -->
  <div id="loading-state" class="hidden" style="text-align:center;padding:60px 0"><div class="spinner"></div><div class="dim" style="margin-top:8px">Loading…</div></div>
  <div id="error-state" class="hidden" style="text-align:center;padding:60px 0"><div class="dim" id="error-message">Error</div><button class="btn-sm" onclick="runAnalyze()" style="margin-top:12px">Retry</button></div>

</main>

<script type="module" src="/static/app-account.v2.js"></script>
</body>
</html>
