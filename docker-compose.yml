services:
  gw2-progression:
    build:
      context: .
      target: development
    ports:
      - "${PORT:-8000}:8000"
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - gw2-data:/app/data
    environment:
      - ENV=${ENV:-development}
      - ENABLE_COMMERCE_ROUTES=${ENABLE_COMMERCE_ROUTES:-true}
      - ENABLE_INFRASTRUCTURE_ROUTES=${ENABLE_INFRASTRUCTURE_ROUTES:-true}
      - ENABLE_AI_LAB_ROUTES=${ENABLE_AI_LAB_ROUTES:-true}
      - ENABLE_EXPERIMENTAL_ROUTES=${ENABLE_EXPERIMENTAL_ROUTES:-true}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-30}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - GW2_API_BASE=${GW2_API_BASE:-https://api.guildwars2.com}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; conn=http.client.HTTPConnection('localhost:8000'); conn.request('GET','/health'); resp=conn.getresponse(); exit(0 if resp.status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  gw2-data:
