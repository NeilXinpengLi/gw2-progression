name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check --output-format=github
      - run: ruff format --check

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-cov
      - name: Run tests with coverage
        run: |
          python -m pytest --cov --cov-report=term --cov-fail-under=69 -v --tb=short -q
        env:
          CI: "true"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --target production -t gw2-progression .
      - name: Test Docker image starts
        run: |
          docker run -d -p 8000:8000 --name gw2-test gw2-progression
          sleep 10
          curl -f http://localhost:8000/health || (docker logs gw2-test && exit 1)
